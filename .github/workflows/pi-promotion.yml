name: Pi promotion

on:
  workflow_dispatch:
    inputs:
      candidate:
        description: Exact stable Pi version to validate; empty resolves npm latest.
        required: false
        type: string
      create_pr:
        description: Open the promotion PR after every validation succeeds.
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

concurrency:
  group: pi-promotion-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  resolve:
    name: "[WATCH] | [PI  ] | Resolve exact candidate"
    runs-on: ubuntu-latest
    outputs:
      candidate: ${{ steps.candidate.outputs.candidate }}
      baseline: ${{ steps.candidate.outputs.baseline }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
      - name: Require trusted default-branch workflow code
        shell: bash
        run: test "${GITHUB_REF}" = "refs/heads/${{ github.event.repository.default_branch }}"
      - id: candidate
        name: Resolve and validate the exact candidate
        shell: bash
        env:
          REQUESTED_CANDIDATE: ${{ inputs.candidate }}
        run: |
          candidate="$REQUESTED_CANDIDATE"
          if [ -z "$candidate" ]; then
            candidate="$(npm view @earendil-works/pi-coding-agent@latest version --registry=https://registry.npmjs.org)"
          fi
          policy="$(python3 .github/scripts/pi_promotion.py policy)"
          baseline="$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["last_verified"])' "$policy")"
          PYTHONPATH=.github/scripts python3 - "$candidate" "$baseline" <<'PY'
          import sys
          from pi_promotion import PromotionError, SupportPolicy, parse_candidate
          candidate, baseline = sys.argv[1:]
          parse_candidate(candidate, SupportPolicy("0.0.0", baseline, (0, 0, 0)))
          PY
          {
            echo "candidate=$candidate"
            echo "baseline=$baseline"
          } >> "$GITHUB_OUTPUT"

  validate:
    name: "[WATCH] | [PI  ] | Promotion validation  <os: ${{ matrix.os }} · runtime: Pi ${{ needs.resolve.outputs.candidate }}>"
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: plugins/ca-pi/tools/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Initialize a redacted failure receipt
        shell: bash
        run: |
          printf 'candidate=%s\nplatform=%s\n' '${{ needs.resolve.outputs.candidate }}' '${{ matrix.os }}' > pi-promotion-receipt.txt
      - name: Capture accepted public help surface
        shell: bash
        run: |
          npm install --global @earendil-works/pi-coding-agent@${{ needs.resolve.outputs.baseline }} --ignore-scripts --registry=https://registry.npmjs.org
          python .github/scripts/pi_promotion.py help > "$RUNNER_TEMP/baseline-help.json"
      - name: Install and compare the exact candidate help surface
        shell: bash
        run: |
          npm install --global @earendil-works/pi-coding-agent@${{ needs.resolve.outputs.candidate }} --ignore-scripts --registry=https://registry.npmjs.org
          python .github/scripts/pi_promotion.py help > "$RUNNER_TEMP/candidate-help.json"
          PYTHONPATH=.github/scripts python - "$RUNNER_TEMP/baseline-help.json" "$RUNNER_TEMP/candidate-help.json" <<'PY'
          import json, sys
          from pi_promotion import HelpDelta, compare_help, render_receipt
          baseline = tuple(json.load(open(sys.argv[1], encoding="utf-8"))["help"])
          candidate = tuple(json.load(open(sys.argv[2], encoding="utf-8"))["help"])
          delta = compare_help(baseline, candidate)
          if delta.incompatible:
              open("pi-promotion-receipt.txt", "w", encoding="utf-8").write(render_receipt(
                  candidate="${{ needs.resolve.outputs.candidate }}", platform="${{ matrix.os }}",
                  contract="help-delta", delta=delta,
              ))
              raise SystemExit("required public Pi help entries disappeared")
          PY
      - name: Apply the declared prospective promotion in this disposable checkout
        run: python .github/scripts/pi_promotion.py apply --candidate ${{ needs.resolve.outputs.candidate }}
      - name: Install reviewed adapter toolchain
        run: npm --prefix plugins/ca-pi/tools ci --ignore-scripts
      - name: Rebuild declared generated artifacts
        run: |
          python tools/build-surface.py
          npm --prefix plugins/ca-pi/tools run build
      - name: Validate adapter, package, security, and documentation contracts
        run: |
          npm --prefix plugins/ca-pi/tools run typecheck
          npm --prefix plugins/ca-pi/tools test
          python .github/scripts/test_pi_security.py
          python .github/scripts/test_pi_parity.py
          python .github/scripts/test_pi_package.py
          python .github/scripts/test_pi_platform_contract.py --pi-version ${{ needs.resolve.outputs.candidate }}
          python .github/scripts/check_docs_contract.py
      - name: Upload compact promotion receipt on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pi-promotion-receipt-${{ matrix.os }}
          path: pi-promotion-receipt.txt
          if-no-files-found: ignore
          retention-days: 14
          include-hidden-files: false
          overwrite: false

  open-pr:
    name: "[PROMOTE] | [PI  ] | Open review PR"
    needs: [resolve, validate]
    if: github.event_name == 'workflow_dispatch' && inputs.create_pr == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Create the deterministic promotion branch contents
        shell: bash
        run: |
          branch="automation/pi-${{ needs.resolve.outputs.candidate }}"
          if gh pr list --head "$branch" --state open --json number --jq 'length' | grep -qx '0'; then
            git switch --create "$branch"
            python .github/scripts/pi_promotion.py apply --candidate ${{ needs.resolve.outputs.candidate }}
            python tools/build-surface.py
            npm --prefix plugins/ca-pi/tools ci --ignore-scripts
            npm --prefix plugins/ca-pi/tools run build
            python .github/scripts/check_docs_contract.py
            git add -- plugins/ca-pi core .github/workflows/ci.yml README.md docs .codearbiter/specs/pi-support.md .codearbiter/tech-stack.md
            git diff --cached --check
            git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore(pi): promote ${{ needs.resolve.outputs.candidate }}"
            git push origin "$branch"
            gh pr create --base main --head "$branch" --title "chore(pi): promote ${{ needs.resolve.outputs.candidate }}" --body "Automated exact Pi promotion candidate. Validation completed on Linux, macOS, and Windows; this PR does not release, tag, or publish."
          else
            echo "A promotion PR for $branch is already open."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
