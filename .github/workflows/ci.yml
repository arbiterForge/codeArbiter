name: ci

# Scoped to the repo's executable surface. The bulk of codeArbiter is prose
# (skills/commands/agents) governed by each plugin's own authoring gates - CI's
# job here is the mechanical things review can't catch: a stale shipped build
# artifact, a regression in the farm dispatcher, or a manifest that won't parse.
# A pure skill/docs PR matches none of these paths and skips CI entirely.
#
# ADR-0007: the repo hosts two sibling plugins (ca, ca-sandbox) with PATH-SCOPED
# CI - a diff touching only plugins/ca-sandbox/** runs the docker-gated
# ca-sandbox tools job and SKIPS every ca job (tools tests, refs graph,
# version-bump guard); a diff touching only plugins/ca/** skips the ca-sandbox
# job. The `changes` job below computes per-plugin flags via dorny/paths-filter
# and every plugin-specific job gates on them. Shared infra (hooks, JSON
# manifests) stays repo-wide - it is owned by neither plugin.

on:
  pull_request:
    # Campaign-branch coverage (issue #258): feat/codex-support-m0 integrates
    # every ca-codex fix PR before it lands on main, so PRs targeting it need
    # the same CI gate PRs targeting main get - otherwise the whole codex
    # campaign merges with zero CI. Drop this once the campaign branch is
    # closed out and merged to main.
    branches: [main, feat/codex-support-m0]
  push:
    branches: [main]
    paths:
      - "plugins/ca/**"
      - "plugins/ca-sandbox/**"
      - "plugins/ca-codex/**"
      - "plugins/ca-pi/**"
      - "core/**"
      - "**/*.json"
      - "README.md"
      - "LICENSE"
      - ".github/workflows/ci.yml"
      - ".github/scripts/**"
      - "tools/host_descriptors.py"
      - "tools/build-surface.py"
      - "tools/sync-core.py"
      - "tools/build-host-packages.py"
      - "tools/ci-impact.py"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: "[CHECK] | [REPO] | Impact selection"
    runs-on: ubuntu-latest
    outputs:
      ca: ${{ steps.filter.outputs.ca }}
      ca-sandbox: ${{ steps.filter.outputs.ca-sandbox }}
      ca-codex: ${{ steps.filter.outputs.ca-codex }}
      ca-pi: ${{ steps.filter.outputs.ca-pi }}
      host-descriptors: ${{ steps.filter.outputs.host-descriptors }}
      hooks: ${{ steps.filter.outputs.hooks }}
      impact: ${{ steps.filter.outputs.impact }}
      manifests: ${{ steps.filter.outputs.manifests }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          list-files: shell
          # A change to shared CI infra (.github/) flags BOTH plugins so the
          # full mechanical surface re-runs. A plugin-only change flags just
          # that plugin - this is the path-scoping ADR-0007 requires.
          #
          # core/** is the canonical-copy source every host-neutral hook file
          # is vendored FROM (tools/sync-core.py, ADR-0011 M1) into BOTH
          # plugins/ca/hooks/ and plugins/ca-codex/hooks/ - a core/** edit can
          # drift either vendored copy, so it flags ca, ca-codex, AND hooks.
          filters: |
            all:
              - '**'
            ca:
              - 'plugins/ca/**'
              - 'core/**'
              - 'README.md'
              - '.github/workflows/ci.yml'
              - '.github/scripts/check-plugin-refs.py'
              - '.github/scripts/check_badge_consistency.py'
            ca-sandbox:
              - 'plugins/ca-sandbox/**'
              - '.github/workflows/ci.yml'
              - '.github/scripts/check-plugin-refs.py'
            ca-codex:
              - 'plugins/ca-codex/**'
              - 'core/**'
              - '.github/workflows/ci.yml'
            ca-pi:
              - 'plugins/ca-pi/**'
              - 'core/**'
              - 'package.json'
              - 'tools/build-host-packages.py'
              - '.github/scripts/test_pi_package.py'
              - '.github/scripts/test_pi_parity.py'
              - '.github/scripts/pi_benchmark.py'
              - '.github/scripts/test_pi_benchmark.py'
              - '.github/scripts/test_pi_platform_contract.py'
              - '.github/scripts/test_pi_security.py'
              - '.github/workflows/codeql.yml'
              - '.github/workflows/ci.yml'
            host-descriptors:
              - 'core/hosts.json'
              - 'core/surface/**'
              - 'plugins/ca-pi/**'
              - 'tools/host_descriptors.py'
              - 'tools/build-surface.py'
              - 'tools/sync-core.py'
              - 'tools/build-host-packages.py'
              - '.github/scripts/test_host_descriptors.py'
              - '.github/workflows/ci.yml'
            hooks:
              - 'plugins/ca/hooks/**'
              - 'plugins/ca-codex/hooks/**'
              - 'plugins/ca-pi/hooks/**'
              - 'core/**'
              - '.github/scripts/**'
              - '.github/workflows/ci.yml'
            impact:
              - '.github/ci-impact-map.json'
              - '.github/scripts/test_ci_impact.py'
              - 'core/hosts.json'
              - 'tools/ci-impact.py'
              - 'tools/host_descriptors.py'
              - '.github/workflows/ci.yml'
            manifests:
              - '**/*.json'
              - '.github/workflows/ci.yml'
      - name: Write impact receipt
        id: impact
        env:
          CHANGED_FILES: ${{ steps.filter.outputs.all_files }}
        run: |
          python tools/ci-impact.py \
            --map .github/ci-impact-map.json \
            --hosts core/hosts.json \
            --changed-files "$CHANGED_FILES" \
            --output impact.json \
            --summary "$GITHUB_STEP_SUMMARY"
      - name: Store impact receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-impact-receipt
          path: impact.json
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
          overwrite: false

  host-descriptors:
    name: "[CHECK] | [CORE] | Host descriptor contract"
    needs: changes
    if: needs.changes.outputs.host-descriptors == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Run the complete host descriptor and generated-only suite
        run: python .github/scripts/test_host_descriptors.py

  ci-impact:
    name: "[CHECK] | [REPO] | Impact planner contract"
    needs: changes
    if: needs.changes.outputs.impact == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Validate impact-map fallback, receipt, and name contracts
        run: python .github/scripts/test_ci_impact.py

  tools:
    name: "[CHECK] | [CA  ] | Farm dispatcher contract"
    needs: changes
    if: needs.changes.outputs.ca == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/ca/tools
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/ca/tools/package-lock.json
      - name: Install (locked)
        run: npm ci
      - name: Audit (CVE gate - fail on CRITICAL)
        # Supply-chain gate per security-controls.md: a CRITICAL advisory in a
        # production dependency fails the build. --omit=dev scopes to shipped
        # deps; --audit-level=critical intentionally ignores lower severities so
        # routine dev-tool advisories don't block unrelated PRs.
        run: npm audit --omit=dev --audit-level=critical
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Rebuild farm.js
        run: npm run build
      - name: Fail if committed farm.js is stale
        run: |
          if ! git diff --quiet -- farm.js; then
            echo "::error file=plugins/ca/tools/farm.js::farm.js is out of date with farm.ts. Run 'npm run build' in plugins/ca/tools and commit the result - the plugin ships farm.js, not farm.ts."
            git --no-pager diff -- farm.js
            exit 1
          fi
          echo "farm.js is in sync with farm.ts"

  ca-sandbox-tools:
    name: "[CHECK] | [SBX ] | Sandbox driver contract"
    needs: changes
    if: needs.changes.outputs.ca-sandbox == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/ca-sandbox/tools
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/ca-sandbox/tools/package-lock.json
      - name: Install (locked)
        run: npm ci
      - name: Audit (CVE gate - fail on CRITICAL)
        run: npm audit --omit=dev --audit-level=critical
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        # Docker-gated. The bulk of the ca-sandbox suite spins real containers;
        # those specs probe `docker info` and skip themselves when Docker is
        # absent. The GitHub ubuntu-latest runner ships Docker, so they run for
        # real here; the pure-unit specs (mounts, dephash) always run.
        run: npm test
      - name: Rebuild sandbox.js
        run: npm run build
      - name: Fail if committed sandbox.js is stale
        run: |
          if ! git diff --quiet -- sandbox.js; then
            echo "::error file=plugins/ca-sandbox/tools/sandbox.js::sandbox.js is out of date with cli.ts. Run 'npm run build' in plugins/ca-sandbox/tools and commit the result - the plugin ships sandbox.js, not the TypeScript sources."
            git --no-pager diff -- sandbox.js
            exit 1
          fi
          echo "sandbox.js is in sync with the TypeScript sources"

  ca-pi-tools:
    name: "[CHECK] | [PI  ] | Adapter contract  <os: ${{ matrix.os }} · runtime: Pi ${{ matrix.pi-version }}>"
    needs: changes
    if: needs.changes.outputs.ca-pi == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        pi-version: ["0.80.5", "0.80.10"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/ca-pi/tools
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: plugins/ca-pi/tools/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Install external Pi host (scripts disabled)
        run: npm install --global @earendil-works/pi-coding-agent@${{ matrix.pi-version }} --ignore-scripts
      - name: Install reviewed toolchain (scripts disabled)
        run: npm ci --ignore-scripts
      - name: Check generated root package metadata
        working-directory: .
        run: python tools/build-host-packages.py --check
      - name: Typecheck
        run: npm run typecheck
      - name: Test package, module identity, compatibility, and native binding
        run: npm test -- test/package.test.ts
      - name: Test activation, commands, and status lifecycle
        run: npm test -- test/activation.test.ts test/commands.test.ts test/status.test.ts
      - name: Test canonical bridge and final-execution enforcement
        run: npm test -- test/bridge.test.ts test/tool-guard.test.ts
      - name: Test adversarial Pi security promotion contract
        working-directory: .
        run: python .github/scripts/test_pi_security.py
      - name: Test three-host enforcement and descriptor parity
        working-directory: .
        run: python .github/scripts/test_pi_parity.py
      - name: Rebuild externalized bundles
        run: npm run build
      - name: Fail if committed bundles are stale
        working-directory: .
        shell: bash
        run: |
          if ! git diff --quiet -- plugins/ca-pi/extensions plugins/ca-pi/helpers; then
            echo "::error file=plugins/ca-pi/helpers/windows-supervisor.js::Pi bundles or the Windows supervisor are stale. Run npm --prefix plugins/ca-pi/tools run build."
            git --no-pager diff -- plugins/ca-pi/extensions plugins/ca-pi/helpers
            exit 1
          fi
      - name: Test release package contract
        working-directory: .
        run: python .github/scripts/test_pi_package.py
      - name: Test real package RPC activation and aliases
        working-directory: .
        run: python .github/scripts/test_pi_package.py --rpc-commands
      - name: Test cross-platform paths, encoding, cancellation, process trees, prune, and generation
        working-directory: .
        run: python .github/scripts/test_pi_platform_contract.py --pi-version ${{ matrix.pi-version }}
      - name: Measure the three-host relative adapter benchmark
        working-directory: .
        run: python .github/scripts/pi_benchmark.py --samples 100

  ca-pi-latest:
    name: "[WATCH] | [PI  ] | Upstream compatibility  <runtime: npm latest>"
    needs: changes
    if: needs.changes.outputs.ca-pi == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/ca-pi/tools
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: plugins/ca-pi/tools/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Install reviewed toolchain and external latest Pi (scripts disabled)
        run: |
          npm ci --ignore-scripts
          npm install --global @earendil-works/pi-coding-agent@latest --ignore-scripts
      - name: Report latest version and test installed runtime admission
        run: |
          pi --version
          npm test -- test/package.test.ts -t "installed Pi runtime is admitted by the production boundary"
          npm test -- test/package.test.ts
      - name: Run the latest Pi platform contract as a nonblocking canary
        working-directory: .
        run: python .github/scripts/test_pi_platform_contract.py --pi-version latest

  ca-pi-codeql:
    name: "[CHECK] | [PI  ] | Security analysis  <language: JavaScript/TypeScript>"
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.ca-pi == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Initialize scoped Pi CodeQL database
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: javascript-typescript
          build-mode: none
          config: |
            name: ca-pi-security
            queries:
              - uses: security-extended
            paths:
              - plugins/ca-pi/tools/src
              - plugins/ca-pi/extensions
            paths-ignore:
              - plugins/ca-pi/tools/node_modules
      - name: Analyze Pi without duplicating default code-scanning uploads
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:javascript-typescript"
          output: codeql-results
          upload: never
      - name: Fail unresolved high-severity findings
        run: python .github/scripts/test_pi_security.py --sarif codeql-results

  hooks:
    name: "[CHECK] | [CORE] | Hook contract  <os: ${{ matrix.os }}>"
    # MR-10: proves host-specific interpreter fallback on every OS - REAL (no
    # double execution), STUB (preferred interpreter fails), PY2 (`python`
    # exists but is not Python 3; ca must fall back and preserve exit-2 blocks),
    # and NONE (no Python; fail LOUD, never silently dormant). The Windows ca
    # path also proves a successful python3/MSIX alias is never activated.
    # See .github/scripts/test_hooks_cold_install.py.
    # Shared infra (the ca plugin's hooks) - runs whenever CI runs; not gated
    # per-plugin because the hook payload belongs to neither sandbox driver.
    needs: changes
    if: needs.changes.outputs.hooks == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Sync-core drift gate (ADR-0011 M1)
        # core/pysrc/ is the canonical copy of every host-neutral hook file;
        # plugins/ca/hooks/ and plugins/ca-codex/hooks/ each vendor a
        # byte-identical copy (tools/sync-core.py). A vendored copy that
        # drifts from core silently forks the enforcement logic between the
        # two hosts - fail the build before that ships.
        run: python tools/sync-core.py --check
      - name: Run sync-core tool unit tests
        # FINDING 2 (2026-07 review): sync/--check pass-fail matrix (in-sync,
        # drifted, missing), write-mode drift repair, and the hardened
        # non-zero/clear-message error paths for an unreadable source file,
        # an unwritable destination, and an empty/missing core dir.
        run: python .github/scripts/test_sync_core.py
      - name: Run codex-parity-fixture tool unit tests
        # FINDING 4 (2026-07 review): normal + --bare fixture creation,
        # existing-target rejection, and every git/filesystem failure path
        # exiting non-zero with a clear stderr message (no swallowed
        # subprocess return codes, no raw traceback on a creation failure).
        run: python .github/scripts/test_codex_parity_fixture.py
      - name: Run surface-generator unit tests
        # codex-support M3: determinism/idempotence of tools/build-surface.py,
        # token inversion (Claude render inverts extraction byte-exactly),
        # host conditionals, Codex path rewrites + frontmatter synthesis, and
        # --check drift detection in both directions against synthetic trees.
        run: python .github/scripts/test_build_surface.py
      - name: Run cold-install interpreter matrix
        run: python .github/scripts/test_hooks_cold_install.py
      - name: Run ca-codex host-adapter parity suite
        # ADR-0011 M2: Codex payload normalization, apply_patch envelope
        # parsing, project_root resolution, and cross-host blocked-verdict
        # parity (H-05/H-11/H-18/H-19/H-20/H-21) via real subprocess
        # invocations of each plugin's vendored pre-write.py/pre-bash.py.
        run: python .github/scripts/test_codex_adapter.py
      - name: Validate public Codex documentation
        # Public claims stay pinned to the verified host/version evidence,
        # installation status, command spellings, and canonical support page.
        run: python .github/scripts/test_public_codex_docs.py
      - name: Run dual-host shared-store contract
        # ADR-0012: sequential initialization shares one store; concurrency is
        # asserted only for append-only gate events, never RMW state or the
        # repo-global dev marker.
        run: python .github/scripts/test_dual_host_store.py
      - name: Run guard-logic matrix
        # The cold-install matrix proves the interpreter plumbing; this proves
        # the guard decisions themselves - every blocked spelling of
        # H-01/02/03/05/11/09b blocks, every legitimate spelling still allows.
        run: python .github/scripts/test_hook_guards.py
      - name: Run /ca:preview helper unit tests
        # Unit tests for the /ca:preview diff-collection + secret-scan helpers
        # (_previewlib): collect_diff over the three change kinds it unions and
        # the redacting secret scan, including the no-raise edges.
        run: python .github/scripts/test_preview_lib.py
      - name: Run UX-conversion-trio structural copy tests
        # Content-presence/absence assertions for the #82/#84/#83 prose changes:
        # the Receipt close, stakes lines on substantive finding-blocks, the
        # register split, and the negatives (no saves-ledger/statusline segment).
        run: python .github/scripts/test_ux_conversion.py
      - name: Run cold-miss nudge unit tests
        # O1-O11: nudge_decision pure helper, advisory builder, idle extraction,
        # hook_run integration (armed->2/stderr, resubmit->0, flag-off->today's
        # behavior), and docs gate (prune.md references CODEARBITER_PRUNE_NUDGE).
        run: python .github/scripts/test_prune_nudge.py
      - name: Run H-14 migration backstop tests
        # OB-01..11 + OB-C1/OB-S1 (#77): is_migration_path detection (defaults +
        # security-controls.md extend/exclude), migration-pass.py content-digest
        # marker, and pre-bash.py H-14 block/admit/edit-reblock/dormant/-a.
        run: python .github/scripts/test_migration_backstop.py
      - name: Run /ca:metrics helper unit tests
        # AC-01..AC-07: window tiling, 3-metric collection, empty-source safety,
        # and read-only enforcement (_metricslib).
        run: python .github/scripts/test_metrics_lib.py
      - name: Run task-board lifecycle helper unit tests
        # AC-01..AC-10: in-flight count (excludes done), dotted-ID grammar,
        # field parsing, stale-in-progress nudge, oversize degradation, and the
        # session-start/statusline readers routing through _taskboardlib.
        run: python .github/scripts/test_taskboardlib.py
      - name: Run task-board writer + harvest unit tests
        # AC-01..AC-11: next_seq, add_entry (ID-less + mint), set_state (dated
        # start/done + assign-on-pickup), dedup, the 3 harvest extractors, and
        # promote routing/modes (work->board, decision->questions).
        run: python .github/scripts/test_taskwriter.py
      - name: Run release-skill hardening helper unit tests
        # AC-1..AC-6 of release-skill-hardening: last_tag_select (ca-only,
        # pre-release-excluded baseline), notes_heading_matches, release_dates_
        # consistent, classify_publish_state, the CLI dispatch, and the SKILL.md
        # structural wiring (_releaselib).
        run: python .github/scripts/test_release_lib.py
      - name: Run provenance-store helper unit tests
        # AC-01: write_provenance/read_provenance round-trip, on-disk JSON shape
        # with schema/doc/created/interview_derived/entries[] (_provenancelib).
        run: python .github/scripts/test_provenancelib.py
      - name: Run README badge-consistency unit tests
        # The guard's own logic: version-badge parse, count-badge parse, prose
        # counts, table-row slugs, and each drift kind (version/count/prose/
        # catalog/missing-row) failing - plus the live HEAD-is-consistent check.
        run: python .github/scripts/test_badge_consistency.py
      - name: Run shared hook-helper unit tests (_hooklib)
        # CRYPTO_RE / SECRET_RE branch coverage + the path/frontmatter/marker/
        # digest helpers every enforcement hook routes through. Ran nowhere in CI
        # before (checkpoint 2026-06-22 gap); the ~18 CRYPTO_RE branches now have
        # direct assertions.
        run: python .github/scripts/test_hooklib.py
      - name: Run commit-gate board-sync structural tests
        # AC-04..07 (ADR-0008): Phase 6 board-edit exemption names the classifier,
        # retains a clean transition, still flags arbitrary edits; task.md and
        # future prose checks enforce the co-location contract.
        run: python .github/scripts/test_board_sync.py
      - name: Run commit-gate provenance auto-heal wiring tests
        # AC-14 (T-17): Phase 5.5 heal_worklist, incremental re-scout scoped to
        # those paths only, re-baseline rides work commit, claim-changed routes to
        # Phase 6 diff-review; Phase 6/7 provenance exemption + staging wiring.
        run: python .github/scripts/test_provenance_wiring.py
      - name: Run file-scoped-context-injection lib unit tests
        # AC-03/09/10/12 (_readinjectlib): allow_output hookSpecificOutput shape,
        # four-tier context map/budget/dedup/index assembly, cache round-trip.
        run: python .github/scripts/test_readinjectlib.py
      - name: Run pre-read hook entry-point integration tests
        # AC-03/09/10/12 (pre-read.py): governed-file injection, dedup (same
        # session+file -> first injects, second silent), .codearbiter/ self-read
        # silent allow, fail-open on malformed stdin, miss, and dormant-repo paths.
        run: python .github/scripts/test_pre_read.py
      - name: Run the hooks/tests unittest suite
        # plugins/ca/hooks/tests/ - the hook enforcement + helper logic. Ran only
        # locally per CONTRIBUTING; wired here so the guards are mechanically
        # enforced. Stdlib-only, cross-platform (discovered on every matrix OS).
        run: python -m unittest discover -s plugins/ca/hooks/tests -p "test_*.py"

  version-bump:
    name: "[GATE ] | [CA  ] | Payload version"
    # `claude plugin update` is a NO-OP when plugin.json's version string is
    # unchanged - verified live 2026-06-10: a months-stale hooks.json survived
    # a marketplace refresh until uninstall+reinstall. So any change to the
    # shipped payload (plugins/ca/**) that rides an already-published version
    # silently never reaches installed users. This guard fails such a PR.
    # Pre-publication PRs pass: the rule only bites when tag v<version>
    # already exists. Gated to ca-touching diffs (ADR-0007 path-scoping).
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.ca == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fail if a published version ships a changed payload
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git fetch -q origin "$BASE" --tags
          if git diff --quiet "origin/$BASE"...HEAD -- plugins/ca; then
            echo "no payload change - version bump not required"
            exit 0
          fi
          ver=$(node -p "JSON.parse(require('fs').readFileSync('plugins/ca/.claude-plugin/plugin.json','utf8')).version")
          base_ver=$(git show "origin/$BASE:plugins/ca/.claude-plugin/plugin.json" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
          if [ "$ver" != "$base_ver" ]; then
            echo "payload changed and version bumped: $base_ver -> $ver"
            exit 0
          fi
          if git rev-parse -q --verify "refs/tags/v$ver" > /dev/null; then
            echo "::error file=plugins/ca/.claude-plugin/plugin.json::plugins/ca/** changed but version is still $ver, which is already published (tag v$ver exists). 'claude plugin update' no-ops on an unchanged version, so installed users would silently keep the old payload. Bump the version."
            exit 1
          fi
          echo "payload changed on unpublished version $ver (no tag v$ver) - allowed"

  version-bump-sandbox:
    name: "[GATE ] | [SBX ] | Payload version"
    # Per-plugin twin of the ca version-bump guard (ADR-0007): the two plugins
    # version independently, so a changed ca-sandbox payload on an
    # already-published ca-sandbox version (tag ca-sandbox-v<version>) is the
    # same silent-staleness trap and is failed here. The sandbox plugin's tags
    # are namespaced (ca-sandbox-v*) so they never collide with ca's v* tags.
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.ca-sandbox == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fail if a published version ships a changed payload
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git fetch -q origin "$BASE" --tags
          if git diff --quiet "origin/$BASE"...HEAD -- plugins/ca-sandbox; then
            echo "no payload change - version bump not required"
            exit 0
          fi
          ver=$(node -p "JSON.parse(require('fs').readFileSync('plugins/ca-sandbox/.claude-plugin/plugin.json','utf8')).version")
          # First introduction of the plugin: plugin.json does not exist on base.
          # That is never a silent-staleness trap (nothing is published yet), so
          # allow it. NOTE: `git cat-file -e` on the tree-ish:path form exits
          # 128 (not 1) when the PATH is absent from the tree, so absence cannot
          # be distinguished from a bad ref by exit code alone. Instead, verify
          # the base ref resolves first; once it does, any cat-file failure on
          # the path means the file is genuinely absent at $BASE. A ref that
          # does not resolve (transient fetch error, a race on origin/$BASE)
          # must fail the step, not be swallowed as "first introduction".
          if ! git rev-parse --verify --quiet "origin/$BASE^{commit}" > /dev/null; then
            echo "::error::origin/$BASE does not resolve to a commit - bad ref or failed fetch"
            exit 1
          fi
          if ! git cat-file -e "origin/$BASE:plugins/ca-sandbox/.claude-plugin/plugin.json" 2>/dev/null; then
            echo "ca-sandbox is new on $BASE (no prior plugin.json) - first introduction, version bump not required"
            exit 0
          fi
          base_json=$(git show "origin/$BASE:plugins/ca-sandbox/.claude-plugin/plugin.json")
          base_ver=$(printf '%s' "$base_json" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
          if [ "$ver" != "$base_ver" ]; then
            echo "payload changed and version bumped: $base_ver -> $ver"
            exit 0
          fi
          if git rev-parse -q --verify "refs/tags/ca-sandbox-v$ver" > /dev/null; then
            echo "::error file=plugins/ca-sandbox/.claude-plugin/plugin.json::plugins/ca-sandbox/** changed but version is still $ver, which is already published (tag ca-sandbox-v$ver exists). 'claude plugin update' no-ops on an unchanged version, so installed users would silently keep the old payload. Bump the version."
            exit 1
          fi
          echo "payload changed on unpublished version $ver (no tag ca-sandbox-v$ver) - allowed"

  version-bump-codex:
    name: "[GATE ] | [CDX ] | Payload version"
    # Per-plugin twin of the ca / ca-sandbox version-bump guards (ADR-0007
    # path-scoping, ADR-0011 Codex host): ca-codex versions independently, so
    # a changed ca-codex payload on an already-published ca-codex version
    # (tag ca-codex-v<version>) is the same silent-staleness trap and is
    # failed here. Namespaced tags (ca-codex-v*) never collide with ca's bare
    # v* series or ca-sandbox's ca-sandbox-v* series.
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.ca-codex == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fail if a published version ships a changed payload
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git fetch -q origin "$BASE" --tags
          if git diff --quiet "origin/$BASE"...HEAD -- plugins/ca-codex; then
            echo "no payload change - version bump not required"
            exit 0
          fi
          ver=$(node -p "JSON.parse(require('fs').readFileSync('plugins/ca-codex/.codex-plugin/plugin.json','utf8')).version")
          # First introduction of the plugin: plugin.json does not exist on base.
          # That is never a silent-staleness trap (nothing is published yet), so
          # allow it. NOTE: `git cat-file -e` on the tree-ish:path form exits
          # 128 (not 1) when the PATH is absent from the tree, so absence cannot
          # be distinguished from a bad ref by exit code alone. Instead, verify
          # the base ref resolves first; once it does, any cat-file failure on
          # the path means the file is genuinely absent at $BASE. A ref that
          # does not resolve (transient fetch error, a race on origin/$BASE)
          # must fail the step, not be swallowed as "first introduction".
          if ! git rev-parse --verify --quiet "origin/$BASE^{commit}" > /dev/null; then
            echo "::error::origin/$BASE does not resolve to a commit - bad ref or failed fetch"
            exit 1
          fi
          if ! git cat-file -e "origin/$BASE:plugins/ca-codex/.codex-plugin/plugin.json" 2>/dev/null; then
            echo "ca-codex is new on $BASE (no prior plugin.json) - first introduction, version bump not required"
            exit 0
          fi
          base_json=$(git show "origin/$BASE:plugins/ca-codex/.codex-plugin/plugin.json")
          base_ver=$(printf '%s' "$base_json" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
          if [ "$ver" != "$base_ver" ]; then
            echo "payload changed and version bumped: $base_ver -> $ver"
            exit 0
          fi
          if git rev-parse -q --verify "refs/tags/ca-codex-v$ver" > /dev/null; then
            echo "::error file=plugins/ca-codex/.codex-plugin/plugin.json::plugins/ca-codex/** changed but version is still $ver, which is already published (tag ca-codex-v$ver exists). 'claude plugin update' no-ops on an unchanged version, so installed users would silently keep the old payload. Bump the version."
            exit 1
          fi
          echo "payload changed on unpublished version $ver (no tag ca-codex-v$ver) - allowed"

  version-bump-pi:
    name: "[GATE ] | [PI  ] | Payload version"
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.ca-pi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fail if a tagged Pi payload changes without synchronized release metadata
        env:
          BASE_COMMIT: ${{ github.event.pull_request.base.sha }}
        run: python tools/build-host-packages.py --check --release-guard-base "$BASE_COMMIT"

  prose:
    name: "[CHECK] | [CA  ] | Reference graph"
    needs: changes
    if: needs.changes.outputs.ca == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Check cross-reference graph (ca)
        run: python3 .github/scripts/check-plugin-refs.py ca

  badge-consistency:
    name: "[CHECK] | [CA  ] | Documentation consistency"
    # The mechanical backstop the 2.5.0 release proved was missing: the README
    # version badge, the command/skill/agent count badges, their prose echoes,
    # and the full-catalog table must all match the repo. A release that bumps
    # the payload but forgets the README (the original bug) fails here.
    needs: changes
    if: needs.changes.outputs.ca == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Check README badge/count/catalog consistency (ca)
        run: python3 .github/scripts/check_badge_consistency.py

  prose-sandbox:
    name: "[CHECK] | [SBX ] | Reference graph"
    needs: changes
    if: needs.changes.outputs.ca-sandbox == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Check cross-reference graph (ca-sandbox)
        run: python3 .github/scripts/check-plugin-refs.py ca-sandbox

  manifests:
    name: "[CHECK] | [REPO] | Manifest contract"
    # Shared infra - a broken plugin.json / marketplace.json / hooks.json breaks
    # install for every user regardless of which plugin it belongs to, so this
    # is repo-wide and not gated per-plugin.
    needs: changes
    if: needs.changes.outputs.manifests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Validate every tracked JSON parses
        run: |
          fail=0
          while IFS= read -r f; do
            [ -L "$f" ] && continue   # skip symlinks - a tracked .json must be a real file
            if ! err=$(node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$f" 2>&1); then
              echo "::error file=$f::invalid JSON: $err"
              fail=1
            fi
          done < <(git ls-files '*.json')
          if [ "$fail" -eq 0 ]; then echo "all tracked JSON valid"; fi
          exit $fail
      - name: Validate ca-codex package against pinned schema
        run: |
          codex --version 2>/dev/null || echo "codex CLI not installed; schema baseline is recorded by the validator"
          python3 .github/scripts/validate_codex_plugin.py
      - name: Test the pinned ca-codex package validator
        run: python3 .github/scripts/test_validate_codex_plugin.py

  license-consistency:
    name: "[CHECK] | [REPO] | License consistency"
    # Shared infra - the project's own license declarations (both plugin
    # manifests, the LICENSE file, and the README badge + notice) must all agree
    # with the canonical SPDX, so a partial relicense can't ship (the v2.6.0
    # relicense left three surfaces stale, caught only by human review). Repo-wide
    # and always-on: a license edit can ride any PR. See
    # specs/license-consistency-check.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Check license declarations agree across surfaces
        run: python3 .github/scripts/check_license_consistency.py .

  surface:
    name: "[CHECK] | [CORE] | Generated surface"
    # Shared infra - the whole markdown surface (commands/skills/includes/
    # COMMANDS.md/SPRINT.md/ORCHESTRATOR.md of BOTH plugins) is generated from
    # core/surface/ templates by tools/build-surface.py (ADR-0011 M3). This
    # re-renders every template in memory and byte-compares against the
    # checked-in trees, failing on drift in EITHER direction (template edited
    # without regenerating, or a rendered file hand-edited) and on orphans.
    # It is the strict successor of the retired orchestrator-parity job
    # (issue #262): the two ORCHESTRATOR.md files now deliberately diverge
    # per host, and their shared source of truth is the template. Repo-wide
    # and always-on, like license-consistency: a template or surface edit can
    # ride any PR, and tools/** is not in the path filters.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Check rendered surfaces match core/surface/ templates (both hosts)
        run: python3 tools/build-surface.py --check

  prose-codex:
    name: "[CHECK] | [CDX ] | Reference graph"
    needs: changes
    if: needs.changes.outputs.ca-codex == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Check cross-reference graph (ca-codex)
        run: python3 .github/scripts/check-plugin-refs.py ca-codex

  documentation-contract:
    name: "[CHECK] | [REPO] | Documentation contract"
    # Repository documentation is a cross-cutting public interface: validate
    # its links, current facts, and generated surface on every pull request.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Check repository documentation contract
        run: python3 .github/scripts/check_docs_contract.py

  ci-passed:
    name: "[GATE ] | [REPO] | Merge readiness"
    if: always()
    needs:
      - documentation-contract
      - changes
      - host-descriptors
      - ci-impact
      - tools
      - ca-sandbox-tools
      - ca-pi-tools
      - ca-pi-latest
      - ca-pi-codeql
      - hooks
      - version-bump
      - version-bump-sandbox
      - version-bump-codex
      - version-bump-pi
      - prose
      - badge-consistency
      - prose-sandbox
      - manifests
      - license-consistency
      - surface
      - prose-codex
    runs-on: ubuntu-latest
    steps:
      - name: Require every required job to have succeeded or been skipped
        run: |
          required_results="${{ needs['documentation-contract'].result }} ${{ needs.changes.result }} ${{ needs['host-descriptors'].result }} ${{ needs['ci-impact'].result }} ${{ needs.tools.result }} ${{ needs['ca-sandbox-tools'].result }} ${{ needs['ca-pi-tools'].result }} ${{ needs['ca-pi-codeql'].result }} ${{ needs.hooks.result }} ${{ needs['version-bump'].result }} ${{ needs['version-bump-sandbox'].result }} ${{ needs['version-bump-codex'].result }} ${{ needs['version-bump-pi'].result }} ${{ needs.prose.result }} ${{ needs['badge-consistency'].result }} ${{ needs['prose-sandbox'].result }} ${{ needs.manifests.result }} ${{ needs['license-consistency'].result }} ${{ needs.surface.result }} ${{ needs['prose-codex'].result }}"
          canary_result="${{ needs.ca-pi-latest.result }}"
          echo "upstream required results: $required_results"
          echo "advisory Pi canary result: $canary_result"
          for r in $required_results; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::a required CI job concluded '$r'"; exit 1 ;;
            esac
          done
          echo "all required CI jobs passed or were skipped"
