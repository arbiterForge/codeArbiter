<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 466" role="img"
     aria-label="Two-axis labeling model, stacked. Top band, the SemVer axis, governs the whole plugin payload: versions progress v2.5.1, v2.5.2 (current), v2.6.0, and a version bump reaches every user at once. Bottom band, the Feature Forge axis, governs individual features: a feature moves from preview (opt-in, dormant) to stable (on by default) on real-world evidence, and can be preview inside a stable release.">
  <title>Two-axis labeling model: SemVer (whole payload) and Feature Forge (per-feature preview)</title>
  <defs>
    <linearGradient id="ta-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#131a23"/>
    </linearGradient>
    <pattern id="ta-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e6edf3" stroke-opacity="0.028" stroke-width="1"/>
    </pattern>
    <marker id="ta-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#56616d"/>
    </marker>
    <marker id="ta-arrow-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#d29922"/>
    </marker>
  </defs>

  <!-- ground -->
  <rect width="720" height="466" fill="url(#ta-bg)"/>
  <rect width="720" height="466" fill="url(#ta-grid)"/>
  <rect x="8" y="8" width="704" height="450" fill="none" stroke="#e3b341" stroke-opacity="0.14" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════
       BAND 1: SEMVER — whole payload
       ═══════════════════════════════════════════════ -->

  <text x="360" y="46" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" letter-spacing="3" fill="#8b95a2">SEMVER AXIS</text>
  <text x="360" y="71" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="19" fill="#f0f3f6" font-weight="700">Whole Payload</text>

  <!-- version progression: v2.5.1 → v2.5.2 (current) → v2.6.0, centred on x=360 -->
  <rect x="203" y="92" width="78" height="38" rx="4" fill="#1c2430" stroke="#46505a" stroke-width="1"/>
  <text x="242" y="116" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="12" fill="#8b95a2">v2.5.1</text>

  <line x1="281" y1="111" x2="317" y2="111" stroke="#56616d" stroke-width="1.5" marker-end="url(#ta-arrow)"/>

  <rect x="317" y="92" width="86" height="38" rx="4" fill="#1c2430" stroke="#e3b341" stroke-width="1.5"/>
  <text x="360" y="116" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="13" fill="#e3b341" font-weight="700">v2.5.2</text>

  <line x1="403" y1="111" x2="439" y2="111" stroke="#56616d" stroke-width="1.5" marker-end="url(#ta-arrow)"/>

  <rect x="439" y="92" width="78" height="38" rx="4" fill="#1c2430" stroke="#2a3340" stroke-width="1"/>
  <text x="478" y="116" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="12" fill="#828d9a">v2.6.0</text>

  <text x="360" y="160" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#8b95a2">a version bump reaches every user at once</text>

  <text x="360" y="186" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" fill="#828d9a">Governed by</text>
  <text x="360" y="204" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#8b95a2">a semantic versioning contract · MAJOR · MINOR · PATCH</text>

  <!-- band divider -->
  <line x1="40" y1="233" x2="680" y2="233" stroke="#2a3340" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════
       BAND 2: FEATURE FORGE — per-feature preview
       ═══════════════════════════════════════════════ -->

  <text x="360" y="277" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" letter-spacing="3" fill="#c08a6a">FEATURE FORGE AXIS</text>
  <text x="360" y="302" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="19" fill="#f0f3f6" font-weight="700">Per-Feature Preview</text>

  <!-- feature progression: preview → (evidence) → stable, centred on x=360 -->
  <rect x="234" y="323" width="100" height="38" rx="4" fill="#1e1408" stroke="#d97757" stroke-width="1.5"/>
  <text x="284" y="347" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="13" fill="#d97757" font-weight="700">preview</text>

  <text x="362" y="333" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="9" fill="#828d9a">evidence</text>
  <line x1="334" y1="342" x2="390" y2="342" stroke="#d29922" stroke-width="1.5"
        stroke-dasharray="4 3" marker-end="url(#ta-arrow-gold)"/>

  <rect x="390" y="323" width="96" height="38" rx="4" fill="#0f1c10" stroke="#3a8a44" stroke-width="1.5"/>
  <text x="438" y="347" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="13" fill="#4caf57" font-weight="700">stable</text>

  <text x="360" y="391" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#8b95a2">a feature can be preview inside a stable release</text>

  <text x="360" y="417" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" fill="#828d9a">Governed by</text>
  <text x="360" y="435" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#8b95a2">real-world evidence from users who opt in</text>
</svg>
