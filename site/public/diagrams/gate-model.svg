<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" role="img"
     aria-label="Gate model, stacked. Top band, the soft gate: a commit reaches the gate, which surfaces a decision and waits; once the user acts the work proceeds. Bottom band, the hard gate: a true stop that is never auto-decided, even under autonomous execution; the user must act before work can continue. Hard gates cover security, auth/crypto, irreversible ops, gate bypass, and merge to main, and are rare by design.">
  <title>Gate model: soft gate (surfaces and waits) and hard gate (a true stop)</title>
  <defs>
    <linearGradient id="gm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#131a23"/>
    </linearGradient>
    <pattern id="gm-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e6edf3" stroke-opacity="0.028" stroke-width="1"/>
    </pattern>
    <filter id="gm-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gm-glow-red" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="gm-arrow-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#d29922"/>
    </marker>
    <marker id="gm-arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#c04040"/>
    </marker>
  </defs>

  <!-- ground -->
  <rect width="720" height="470" fill="url(#gm-bg)"/>
  <rect width="720" height="470" fill="url(#gm-grid)"/>
  <rect x="8" y="8" width="704" height="454" fill="none" stroke="#e3b341" stroke-opacity="0.14" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════
       BAND 1: SOFT GATE — surfaces, then waits
       ═══════════════════════════════════════════════ -->

  <text x="360" y="46" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="11" letter-spacing="3" fill="#8b95a2">SOFT GATE</text>
  <text x="360" y="73" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="19" fill="#f0f3f6" font-weight="700">Surfaces, Then Waits</text>

  <!-- soft gate: gold pillars, open -->
  <g filter="url(#gm-glow)">
    <line x1="130" y1="98" x2="130" y2="162" stroke="#d29922" stroke-width="3"/>
    <line x1="146" y1="98" x2="146" y2="162" stroke="#d29922" stroke-width="3"/>
    <rect x="124" y="90" width="30" height="7" fill="#e3b341"/>
  </g>
  <text x="138" y="180" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="9" letter-spacing="2" fill="#8b95a2">SOFT</text>

  <!-- commit paused at the gate -->
  <circle cx="106" cy="130" r="5" fill="#0b0f14" stroke="#d29922" stroke-width="2"/>
  <rect x="102" y="125" width="3" height="10" rx="1" fill="#d29922"/>
  <rect x="108" y="125" width="3" height="10" rx="1" fill="#d29922"/>

  <!-- gate surfaces the decision -->
  <line x1="162" y1="130" x2="214" y2="130" stroke="#d29922" stroke-width="1.5" marker-end="url(#gm-arrow-gold)"/>
  <rect x="222" y="100" width="224" height="62" rx="4" fill="#1c2430" stroke="#d29922" stroke-width="1.2"/>
  <path d="M 222 124 L 210 130 L 222 136 Z" fill="#1c2430" stroke="#d29922" stroke-width="1.2"/>
  <text x="334" y="122" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#e6edf3">Decision surfaced.</text>
  <text x="334" y="140" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#8b95a2">Which design do you want?</text>
  <text x="334" y="156" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="9" letter-spacing="1" fill="#6e7b8b">waiting for user</text>

  <!-- user acts → cleared → proceeds -->
  <line x1="446" y1="130" x2="502" y2="130" stroke="#d29922" stroke-width="1.5" marker-end="url(#gm-arrow-gold)"/>
  <text x="474" y="122" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="9" fill="#6e7b8b">user acts</text>
  <circle cx="514" cy="130" r="5" fill="#e3b341" filter="url(#gm-glow)"/>
  <line x1="522" y1="130" x2="574" y2="130" stroke="#d29922" stroke-width="1.5" marker-end="url(#gm-arrow-gold)"/>
  <text x="616" y="134" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" fill="#8b95a2">proceeds</text>

  <text x="360" y="198" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#8b95a2">Surfaces a choice; it never blocks forever.</text>
  <text x="360" y="216" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#6e7b8b">Work resumes the moment the user decides.</text>

  <!-- band divider -->
  <line x1="40" y1="238" x2="680" y2="238" stroke="#2a3340" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════
       BAND 2: HARD GATE — a true stop
       ═══════════════════════════════════════════════ -->

  <text x="360" y="276" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="11" letter-spacing="3" fill="#c04040">HARD GATE</text>
  <text x="360" y="303" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="19" fill="#f0f3f6" font-weight="700">A True Stop</text>

  <!-- hard gate: red pillars, closed -->
  <g filter="url(#gm-glow-red)">
    <line x1="130" y1="326" x2="130" y2="390" stroke="#c04040" stroke-width="3.5"/>
    <line x1="146" y1="326" x2="146" y2="390" stroke="#c04040" stroke-width="3.5"/>
    <rect x="123" y="318" width="32" height="7" fill="#e05050"/>
    <line x1="123" y1="358" x2="155" y2="358" stroke="#e05050" stroke-width="2.5"/>
  </g>
  <text x="139" y="406" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="9" letter-spacing="2" fill="#c04040">HARD</text>

  <!-- commit stopped at the gate -->
  <circle cx="106" cy="358" r="5" fill="#0b0f14" stroke="#c04040" stroke-width="2"/>
  <line x1="102" y1="354" x2="110" y2="362" stroke="#c04040" stroke-width="1.8"/>
  <line x1="110" y1="354" x2="102" y2="362" stroke="#c04040" stroke-width="1.8"/>

  <!-- the stop -->
  <line x1="162" y1="358" x2="214" y2="358" stroke="#c04040" stroke-width="1.5" marker-end="url(#gm-arrow-red)"/>
  <rect x="222" y="324" width="224" height="68" rx="4" fill="#1c1416" stroke="#c04040" stroke-width="1.2"/>
  <path d="M 222 352 L 210 358 L 222 364 Z" fill="#1c1416" stroke="#c04040" stroke-width="1.2"/>
  <text x="334" y="346" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#e6edf3">Stopped.</text>
  <text x="334" y="364" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#8b95a2">Not auto-decided.</text>
  <text x="334" y="381" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#6e7b8b">User must act to continue.</text>

  <!-- no-bypass marker -->
  <rect x="478" y="345" width="168" height="26" rx="3" fill="#1c1416" stroke="#3a2020" stroke-width="1"/>
  <text x="562" y="362" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" letter-spacing="1" fill="#c04040">never auto-decided</text>

  <text x="360" y="424" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#8b95a2">Security · auth/crypto · irreversible ops · gate bypass · merge to main</text>
  <text x="360" y="442" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="9" letter-spacing="1" fill="#6e7b8b">Rare by design: frequent trips signal a thin spec.</text>
</svg>
