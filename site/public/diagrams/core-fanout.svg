<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img"
     aria-label="Core fan-out: one shared source, core/pysrc plus core/surface, is deterministically generated by sync-core.py and build-surface.py into three host plugins — ca for Claude Code, ca-codex for Codex, and ca-pi for Pi. A CI byte-identity check gates every fan-out edge, so the vendored hook core stays byte-identical across all three hosts.">
  <title>Core fan-out: one source, generated into three host plugins, gated by a CI byte-identity check</title>
  <defs>
    <linearGradient id="cf-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#131a23"/>
    </linearGradient>
    <pattern id="cf-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e6edf3" stroke-opacity="0.028" stroke-width="1"/>
    </pattern>
    <filter id="cf-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="cf-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#46505a"/>
    </marker>
    <marker id="cf-arrow-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#d29922"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="url(#cf-bg)"/>
  <rect width="900" height="420" fill="url(#cf-grid)"/>
  <rect x="8" y="8" width="884" height="404" fill="none" stroke="#e3b341" stroke-opacity="0.14" stroke-width="1"/>

  <text x="30" y="34" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" letter-spacing="3" fill="#8b95a2">BUILD-TIME GENERATION</text>
  <text x="30" y="55" font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="15" fill="#e6edf3" font-weight="600">one source, generated into three host plugins</text>

  <!-- source box -->
  <rect x="30" y="170" width="190" height="90" rx="5" fill="#1c2430" stroke="#6e7b8b" stroke-width="1.4"/>
  <text x="125" y="200" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#e6edf3">core/pysrc</text>
  <text x="125" y="218" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#e6edf3">core/surface</text>
  <text x="125" y="240" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b95a2">shared hook core + surface</text>

  <!-- generators -->
  <line x1="220" y1="200" x2="290" y2="140" stroke="#46505a" stroke-width="1.5" marker-end="url(#cf-arrow)"/>
  <text x="255" y="152" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="9" fill="#828d9a">sync-core.py</text>
  <line x1="220" y1="225" x2="290" y2="225" stroke="#46505a" stroke-width="1.5" marker-end="url(#cf-arrow)"/>
  <text x="255" y="218" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="9" fill="#828d9a">build-surface.py</text>
  <line x1="220" y1="250" x2="290" y2="310" stroke="#46505a" stroke-width="1.5" marker-end="url(#cf-arrow)"/>

  <!-- CI byte-identity gate motif, sits on the fan-out point -->
  <g filter="url(#cf-glow)">
    <line x1="300" y1="120" x2="300" y2="320" stroke="#d29922" stroke-width="3"/>
    <line x1="316" y1="120" x2="316" y2="320" stroke="#d29922" stroke-width="3"/>
    <rect x="294" y="112" width="28" height="7" fill="#e3b341"/>
  </g>
  <text x="308" y="105" text-anchor="middle" font-family="ui-monospace, Consolas, monospace"
        font-size="9" letter-spacing="1.5" fill="#d29922">CI: byte-identity check</text>
  <text x="308" y="338" text-anchor="middle" font-family="ui-monospace, Consolas, monospace"
        font-size="9" letter-spacing="1" fill="#828d9a">gates every fan-out edge</text>

  <!-- fan-out to three hosts -->
  <line x1="322" y1="150" x2="392" y2="90" stroke="#d29922" stroke-width="1.5" marker-end="url(#cf-arrow-gold)"/>
  <line x1="322" y1="225" x2="392" y2="225" stroke="#d29922" stroke-width="1.5" marker-end="url(#cf-arrow-gold)"/>
  <line x1="322" y1="290" x2="392" y2="358" stroke="#d29922" stroke-width="1.5" marker-end="url(#cf-arrow-gold)"/>

  <!-- ca -->
  <rect x="400" y="56" width="230" height="68" rx="4" fill="#131a23" stroke="#d29922" stroke-width="1.4"/>
  <text x="415" y="80" font-family="ui-monospace, Consolas, monospace" font-size="13" fill="#e6edf3" font-weight="700">ca</text>
  <text x="415" y="97" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b95a2">Claude Code plugin</text>
  <text x="415" y="113" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#828d9a">identical hook core · adapted commands</text>

  <!-- ca-codex -->
  <rect x="400" y="191" width="230" height="68" rx="4" fill="#131a23" stroke="#d29922" stroke-width="1.4"/>
  <text x="415" y="215" font-family="ui-monospace, Consolas, monospace" font-size="13" fill="#e6edf3" font-weight="700">ca-codex</text>
  <text x="415" y="232" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b95a2">Codex plugin</text>
  <text x="415" y="248" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#828d9a">identical hook core · adapted commands</text>

  <!-- ca-pi -->
  <rect x="400" y="324" width="230" height="68" rx="4" fill="#131a23" stroke="#d29922" stroke-width="1.4"/>
  <text x="415" y="348" font-family="ui-monospace, Consolas, monospace" font-size="13" fill="#e6edf3" font-weight="700">ca-pi</text>
  <text x="415" y="365" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b95a2">Pi plugin</text>
  <text x="415" y="381" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#828d9a">identical hook core · adapted commands</text>

  <!-- shared store note -->
  <line x1="630" y1="90" x2="700" y2="90" stroke="#46505a" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="630" y1="225" x2="700" y2="225" stroke="#46505a" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="630" y1="358" x2="700" y2="358" stroke="#46505a" stroke-width="1.2" stroke-dasharray="3 3"/>
  <path d="M 700 90 L 700 358" fill="none" stroke="#46505a" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="700" y="185" width="170" height="80" rx="4" fill="#0f1c10" stroke="#3a8a44" stroke-width="1.2"/>
  <text x="785" y="212" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e6edf3" font-weight="600">one .codearbiter/</text>
  <text x="785" y="229" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b95a2">store, checked in</text>
  <text x="785" y="248" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="9" fill="#5fae6a">shared project context</text>
</svg>
