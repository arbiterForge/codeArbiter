<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" role="img"
     aria-label="Lane flow: command invocation routes to the owning skill, clears its gate, then ships to version control.">
  <title>Lane flow: command, route, gate, ship</title>
  <defs>
    <linearGradient id="lf-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#131a23"/>
    </linearGradient>
    <pattern id="lf-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e6edf3" stroke-opacity="0.028" stroke-width="1"/>
    </pattern>
    <filter id="lf-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- arrowhead marker -->
    <marker id="lf-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#46505a"/>
    </marker>
    <marker id="lf-arrow-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#d29922"/>
    </marker>
  </defs>

  <!-- ground -->
  <rect width="900" height="160" fill="url(#lf-bg)"/>
  <rect width="900" height="160" fill="url(#lf-grid)"/>

  <!-- outer frame -->
  <rect x="8" y="8" width="884" height="144" fill="none" stroke="#e3b341" stroke-opacity="0.14" stroke-width="1"/>

  <!-- ── STEP 1: COMMAND ── -->
  <!-- box -->
  <rect x="30" y="52" width="136" height="56" rx="3" fill="#131a23" stroke="#46505a" stroke-width="1.5"/>
  <!-- label -->
  <text x="98" y="77" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="13" fill="#e6edf3" font-weight="600">/ca:fix</text>
  <text x="98" y="96" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" fill="#8b95a2" letter-spacing="1.5">COMMAND</text>

  <!-- connector 1→2 -->
  <line x1="166" y1="80" x2="226" y2="80" stroke="#46505a" stroke-width="1.5" marker-end="url(#lf-arrow)"/>

  <!-- ── STEP 2: ROUTE ── -->
  <rect x="234" y="52" width="136" height="56" rx="3" fill="#131a23" stroke="#46505a" stroke-width="1.5"/>
  <text x="302" y="77" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#e6edf3" font-weight="600">orchestrator</text>
  <text x="302" y="96" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" fill="#8b95a2" letter-spacing="1.5">ROUTE</text>

  <!-- connector 2→3 -->
  <line x1="370" y1="80" x2="430" y2="80" stroke="#46505a" stroke-width="1.5" marker-end="url(#lf-arrow)"/>

  <!-- ── STEP 3: GATE ── -->
  <!-- gate pillars (the canonical brand motif) -->
  <g filter="url(#lf-glow)">
    <line x1="446" y1="44" x2="446" y2="116" stroke="#d29922" stroke-width="3"/>
    <line x1="464" y1="44" x2="464" y2="116" stroke="#d29922" stroke-width="3"/>
    <rect x="440" y="36" width="30" height="7" fill="#e3b341"/>
  </g>
  <!-- gate label -->
  <text x="455" y="133" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" letter-spacing="2" fill="#8b95a2">GATE</text>
  <!-- "tests · review · security" annotation above -->
  <text x="455" y="26" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="9" letter-spacing="1" fill="#6e7b8b">tests · review · security</text>

  <!-- commit dot approaching gate (hollow, unproven) -->
  <circle cx="420" cy="80" r="5" fill="#0b0f14" stroke="#6e7b8b" stroke-width="1.5"/>

  <!-- connector 3→4 (gold — proven, cleared) -->
  <line x1="472" y1="80" x2="570" y2="80" stroke="#d29922" stroke-width="1.5" marker-end="url(#lf-arrow-gold)"/>
  <!-- commit dot past gate (filled gold) -->
  <circle cx="524" cy="80" r="5" fill="#e3b341" filter="url(#lf-glow)"/>

  <!-- ── STEP 4: SHIP ── -->
  <rect x="578" y="52" width="136" height="56" rx="3" fill="#131a23" stroke="#d29922" stroke-width="1.5"/>
  <text x="646" y="77" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#e6edf3" font-weight="600">version control</text>
  <text x="646" y="96" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="10" fill="#8b95a2" letter-spacing="1.5">SHIP</text>
  <!-- gold glow on the border -->
  <rect x="578" y="52" width="136" height="56" rx="3" fill="none" stroke="#e3b341" stroke-opacity="0.28" stroke-width="1"/>

  <!-- tail: PR arrow out -->
  <line x1="714" y1="80" x2="778" y2="80" stroke="#46505a" stroke-width="1.5" marker-end="url(#lf-arrow)"/>
  <text x="840" y="84" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="12" fill="#8b95a2" letter-spacing="1">PR</text>

  <!-- seam note -->
  <text x="892" y="153" text-anchor="end"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace"
        font-size="8" letter-spacing="1" fill="#46505a">never a direct write to main</text>
</svg>
