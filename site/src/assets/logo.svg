<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 28" width="160" height="28" role="img" aria-label="codeArbiter">
  <title>codeArbiter</title>
  <defs>
    <filter id="lg-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- gate mark (compact, left) -->
  <!-- commit line segment -->
  <line x1="2" y1="20" x2="26" y2="20" stroke="#46505a" stroke-width="1.5"/>
  <!-- gate posts -->
  <g filter="url(#lg-glow)">
    <line x1="11" y1="10" x2="11" y2="22" stroke="#d29922" stroke-width="2"/>
    <line x1="17" y1="10" x2="17" y2="22" stroke="#d29922" stroke-width="2"/>
    <!-- balance beam -->
    <rect x="6" y="7" width="16" height="2.5" fill="#e3b341"/>
    <!-- pivot -->
    <path d="M 14 7 L 12 3.5 L 16 3.5 Z" fill="#e3b341"/>
  </g>
  <!-- proved commit dot -->
  <circle cx="24" cy="20" r="2.5" fill="#e3b341" filter="url(#lg-glow)"/>
  <!-- unproven commit dot -->
  <circle cx="4" cy="20" r="2" fill="none" stroke="#6e7b8b" stroke-width="1.2"/>

  <!-- wordmark -->
  <text x="34" y="21"
        font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="16" letter-spacing="0.2">
    <tspan fill="#e6edf3" font-weight="300">code</tspan><tspan fill="#e3b341" font-weight="700">Arbiter</tspan>
  </text>
</svg>
