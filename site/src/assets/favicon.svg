<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="codeArbiter">
  <title>codeArbiter</title>
  <defs>
    <radialGradient id="fv-haze" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#e3b341" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#e3b341" stop-opacity="0"/>
    </radialGradient>
    <filter id="fv-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="32" height="32" rx="5" fill="#0b0f14"/>
  <rect width="32" height="32" rx="5" fill="url(#fv-haze)"/>

  <!-- commit line -->
  <line x1="4" y1="22" x2="28" y2="22" stroke="#46505a" stroke-width="1.5"/>

  <!-- gate posts -->
  <g filter="url(#fv-glow)">
    <line x1="13" y1="12" x2="13" y2="25" stroke="#d29922" stroke-width="2"/>
    <line x1="19" y1="12" x2="19" y2="25" stroke="#d29922" stroke-width="2"/>
    <!-- balance beam lintel -->
    <rect x="7" y="9" width="18" height="3" fill="#e3b341"/>
    <!-- pivot triangle -->
    <path d="M 16 9 L 13.5 5.5 L 18.5 5.5 Z" fill="#e3b341"/>
  </g>

  <!-- proved commit: gold filled dot after the gate -->
  <circle cx="25" cy="22" r="3" fill="#e3b341" filter="url(#fv-glow)"/>
  <!-- unproven commit: hollow, before gate -->
  <circle cx="7" cy="22" r="2.5" fill="#0b0f14" stroke="#6e7b8b" stroke-width="1.5"/>
</svg>
