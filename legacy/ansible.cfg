# ansible.cfg — Ansible configuration for COVE solution repos
# ============================================================
# Ansible reads this file from the current working directory when
# running playbooks. Repo-level config ensures consistent behavior
# across all engineers regardless of their local Ansible installation.
#
# Reference: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
#
# IMPORTANT: Do NOT set passwords or secrets here — use environment
# variables, AWS Secrets Manager, or Ansible Vault instead.

[defaults]
# Default inventory file — engineers can override with -i flag.
# hosts.example is the template; the actual hosts file is .gitignored.
inventory = inventory/hosts

# Roles path — Ansible looks here for roles referenced in playbooks.
roles_path = roles

# Disable host key checking for lab/AWS environments where hosts are
# frequently rebuilt and SSH host keys change.
# WARNING: set to True in production environments where host identity matters.
host_key_checking = False

# Retry files are created when a playbook fails — they list the hosts
# that failed so you can re-run against just those hosts.
# Disable in repos to avoid committing retry files accidentally.
# Engineers can enable locally if they find them useful.
retry_files_enabled = False

# Log output to a file for audit and troubleshooting.
# The log file is .gitignored — it contains runtime data, not source.
log_path = /tmp/ansible-cove.log

# Facts caching — disabled by default. Enable for large inventories
# where gathering facts on every run is slow.
# gathering = smart
# fact_caching = jsonfile
# fact_caching_connection = /tmp/ansible-facts-cache
# fact_caching_timeout = 3600

# stdout callback — yaml format is more readable than the default.
# Options: default, yaml, json, minimal, dense, debug
stdout_callback = yaml

# Show elapsed time per task — useful for identifying slow tasks.
# callback_whitelist = timer, profile_tasks

[ssh_connection]
# Pipelining reduces the number of SSH connections required per task.
# Significantly speeds up playbook execution on large inventories.
# Requires requiretty to be disabled in /etc/sudoers on target hosts.
pipelining = True

# SSH arguments — multiplexing reuses SSH connections for speed.
# ControlMaster=auto opens a master connection on first use.
# ControlPersist=60s keeps the master connection open for 60 seconds.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[privilege_escalation]
# Default become settings — most COVE automation requires sudo.
# Override per-play or per-task when not needed.
become = True
become_method = sudo
become_user = root
# become_ask_pass = False  # Set to True if sudo requires a password
