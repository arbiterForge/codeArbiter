name: Bug Report
about: Report a defect or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Run ... 2. Observe ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment (OS, versions)
      placeholder: "RHEL 9.3, Ansible 2.15, Python 3.11"
