---
- name: Template fusion-api systemd unit
  ansible.builtin.template:
    src: fusion-api.service.j2
    dest: /etc/systemd/system/fusion-api.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart fusion-api

- name: Enable and start fusion-api service
  ansible.builtin.systemd:
    name: fusion-api
    enabled: true
    state: started
    daemon_reload: true
  become: true
